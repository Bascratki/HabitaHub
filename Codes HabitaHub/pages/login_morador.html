<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Morador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login_morador.css">
</head>

<body>
    <div class="container">
        <h2>Login</h2>
        <form action="#">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="email" id="usuario" name="usuario" placeholder="Ex: email@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="submit-btn" onclick="validateForm()">Entrar</button>
        </form>
        <div class="form-links">
            <a href="#">Esqueceu a senha?</a>
            <a href="cad_morador.html">Não tenho conta</a>
        </div>
    </div>

    <script src="../js/login_morador.js"></script>
</body>

</html>
