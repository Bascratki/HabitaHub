<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Moradores</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/cad_morador.css">
</head>

<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="form-section">
                <h2>Morador</h2>
                <div class="form-group">
                    <label for="usuario">Usuário</label>
                    <input type="email" id="usuario" name="usuario" placeholder="Ex: email@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>
            </div>
            <div class="divider"></div>
            <div class="form-section">
                <h2>Unidade</h2>
                <div class="form-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Ex: Rua tal, 44, Curitiba - PR"
                        required>
                </div>
                <div class="form-group">
                    <label for="bloco">Bloco</label>
                    <input type="text" id="bloco" name="bloco" placeholder="Digite seu bloco" required>
                </div>
            </div>
        </div>
        <div class="submit-container">
            <button class="submit-btn" onclick="validateForm()">Cadastrar</button>
        </div>
    </div>

    <script src="../js/cad_morador.js"></script>
</body>

</html>
